<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:">
    <title>Notes</title>
    <link rel="stylesheet" href="./node_modules/quill/dist/quill.snow.css">
    <style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
    --bg0: #0d1117;
    --bg1: #161b22;
    --bg2: #1c2330;
    --bg3: #21262d;
    --border: #30363d;
    --border-light: #3a424d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --text-muted: #656d76;
    --accent: #58a6ff;
    --accent-bg: rgba(88,166,255,0.08);
    --accent-border: rgba(88,166,255,0.35);
    --danger: #f85149;
    --danger-bg: rgba(248,81,73,0.10);
    --ok: #3fb950;
    --radius: 8px;
    --radius-sm: 6px;
    --transition: 150ms ease;
}
html, body { height: 100%; overflow: hidden; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
    font-size: 13px;
    background: var(--bg0);
    color: var(--text);
    display: flex;
    flex-direction: column;
}

/* Main layout */
#notes-main { display: flex; flex: 1; min-height: 0; }

/* Sidebar */
#notes-sidebar {
    width: 280px;
    min-width: 220px;
    border-right: 1px solid var(--border);
    background: var(--bg1);
    display: flex;
    flex-direction: column;
    min-height: 0;
}
#sidebar-header {
    padding: 10px 12px 8px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
}
#sidebar-header .search-wrap { position: relative; width: 100%; margin-bottom: 8px; }
#sidebar-header .search-wrap svg {
    position: absolute; left: 9px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px; color: var(--text-muted); pointer-events: none;
}
#notes-search-input {
    width: 100%;
    padding: 7px 10px 7px 30px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg0);
    color: var(--text);
    font-size: 12px;
    font-family: inherit;
}
#notes-search-input::placeholder { color: var(--text-muted); }
#notes-search-input:focus { border-color: var(--accent); outline: none; }

.filter-seg {
    display: flex;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    overflow: hidden;
    background: var(--bg0);
}
.filter-seg button {
    flex: 1;
    padding: 5px 8px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    transition: background var(--transition), color var(--transition);
}
.filter-seg button:hover { color: var(--text); background: var(--bg3); }
.filter-seg button.active {
    background: var(--accent-bg);
    color: var(--accent);
    font-weight: 600;
}
#notes-list-title {
    padding: 6px 12px 4px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
}
#notes-list { flex: 1; overflow-y: auto; min-height: 0; }
#notes-list::-webkit-scrollbar { width: 6px; }
#notes-list::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

.note-item {
    padding: 8px 12px 8px 14px;
    border-bottom: 1px solid rgba(48,54,61,0.5);
    cursor: pointer;
    transition: background var(--transition);
}
.note-item:hover { background: rgba(88,166,255,0.04); }
.note-item.active {
    background: var(--accent-bg);
    border-left: 2px solid var(--accent);
    padding-left: 12px;
}
.ni-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
    word-break: break-word;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
}
.ni-lock { color: var(--accent); margin-right: 4px; font-size: 11px; }
.ni-meta {
    font-size: 10px;
    color: var(--text-muted);
    line-height: 1.25;
    display: flex;
    align-items: center;
    gap: 4px;
    flex-wrap: wrap;
}
.ni-domain {
    padding: 0 5px;
    border-radius: 3px;
    background: var(--bg3);
    font-family: ui-monospace, Menlo, monospace;
    font-size: 9px;
    color: var(--text-dim);
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
}
#notes-list-empty {
    padding: 16px 12px;
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
}

/* Editor column */
#notes-editor-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    min-height: 0;
    background: var(--bg0);
    position: relative;
}

/* Title row: New + title + save status + Delete */
#title-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px 6px 12px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
}
.icon-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 34px;
    height: 34px;
    padding: 0;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    cursor: pointer;
    flex-shrink: 0;
    transition: background var(--transition), border-color var(--transition);
}
.icon-btn:hover { border-color: var(--border-light); background: var(--bg3); }
.icon-btn svg { width: 16px; height: 16px; }
.icon-btn.primary { background: var(--accent-bg); border-color: var(--accent-border); color: var(--accent); }
.icon-btn.primary:hover { background: rgba(88,166,255,0.18); }
.icon-btn.danger:hover { background: var(--danger-bg); border-color: rgba(248,81,73,0.35); color: var(--danger); }
.icon-btn:disabled { opacity: 0.35; cursor: not-allowed; }

#notes-title-input {
    flex: 1;
    min-width: 0;
    padding: 6px 4px;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 20px;
    font-weight: 600;
    font-family: inherit;
    line-height: 1.25;
}
#notes-title-input::placeholder { color: var(--text-muted); font-weight: 500; }
#notes-title-input:focus { outline: none; }
#notes-title-input:read-only { opacity: 0.65; }

#save-status {
    font-size: 11px;
    color: var(--text-muted);
    min-width: 64px;
    text-align: right;
    flex-shrink: 0;
    transition: color var(--transition);
}
#save-status.saving { color: var(--accent); }
#save-status.unsaved { color: #d29922; }
#save-status.saved { color: var(--ok); }

/* Encrypt row: single password + eye + Set password */
#encrypt-row {
    display: none;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 8px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--bg1);
}
#encrypt-row.visible { display: flex; }
.pw-inline-wrap {
    display: flex;
    align-items: center;
    gap: 4px;
    flex: 1;
    min-width: 160px;
    max-width: 320px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg0);
    padding: 2px 8px 2px 10px;
}
.pw-inline-wrap:focus-within { border-color: var(--accent); }
.pw-field {
    flex: 1;
    min-width: 0;
    border: none;
    background: transparent;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    padding: 6px 0;
}
.pw-field:focus { outline: none; }
.btn-pw-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    border-radius: 4px;
    flex-shrink: 0;
}
.btn-pw-toggle:hover { color: var(--text); background: var(--bg3); }
.btn-pw-toggle svg { width: 16px; height: 16px; }

.tb-btn {
    display: inline-flex;
    align-items: center;
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--accent-border);
    background: var(--accent-bg);
    color: var(--accent);
    font-size: 12px;
    font-weight: 500;
    font-family: inherit;
    cursor: pointer;
    transition: background var(--transition);
    flex-shrink: 0;
}
.tb-btn:hover { background: rgba(88,166,255,0.18); }
.tb-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* Site row */
#editor-header {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding: 8px 16px 8px;
    flex-shrink: 0;
}
.site-chip-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 120px;
}
#notes-match-input {
    flex: 1;
    min-width: 0;
    padding: 4px 10px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--bg2);
    color: var(--text);
    font-size: 11px;
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    transition: border-color var(--transition);
}
#notes-match-input:focus { border-color: var(--accent); outline: none; }
#notes-match-input:read-only { opacity: 0.7; }

#btn-lock-toggle[aria-pressed="true"] {
    background: rgba(88,166,255,0.15);
    border-color: var(--accent-border);
    color: var(--accent);
}

/* Editor stack + full-area lock overlay */
#editor-stack {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    position: relative;
}
#editor-empty-hint {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    pointer-events: none;
    z-index: 1;
    color: var(--text-muted);
    font-size: 13px;
    text-align: center;
    padding: 24px;
    line-height: 1.5;
    max-width: 100%;
}
#editor-empty-hint.visible { display: flex; }
#editor-container {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 180px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin: 0 12px 0;
    overflow: hidden;
    position: relative;
    z-index: 2;
    background: var(--bg0);
}

#editor-lock-overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    padding: 24px;
    background: rgba(13,17,23,0.92);
    backdrop-filter: blur(6px);
    border-radius: var(--radius);
    margin: 0 12px;
    border: 1px solid var(--border);
}
#editor-lock-overlay.visible { display: flex; }
.lock-overlay-icon {
    color: var(--accent);
    opacity: 0.9;
}
.lock-overlay-icon svg { width: 40px; height: 40px; }
.lock-overlay-msg {
    font-size: 13px;
    color: var(--text-dim);
    text-align: center;
    max-width: 320px;
    line-height: 1.5;
}
.unlock-form {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 10px;
    width: 100%;
    max-width: 300px;
}
.unlock-form .pw-inline-wrap { max-width: none; }
#btn-unlock { align-self: center; min-width: 120px; }

/* Quill */
.ql-toolbar.ql-snow {
    background: var(--bg1);
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 5px 8px;
    flex-shrink: 0;
}
.ql-toolbar.ql-snow .ql-stroke { stroke: var(--text-dim); }
.ql-toolbar.ql-snow .ql-fill { fill: var(--text-dim); }
.ql-toolbar.ql-snow .ql-picker { color: var(--text-dim); }
.ql-toolbar.ql-snow .ql-picker-label { border-color: transparent; }
.ql-toolbar.ql-snow .ql-picker-label:hover,
.ql-toolbar.ql-snow button:hover { color: var(--text); }
.ql-toolbar.ql-snow button:hover .ql-stroke,
.ql-toolbar.ql-snow .ql-picker-label:hover .ql-stroke { stroke: var(--text); }
.ql-toolbar.ql-snow button:hover .ql-fill,
.ql-toolbar.ql-snow .ql-picker-label:hover .ql-fill { fill: var(--text); }
.ql-toolbar.ql-snow button.ql-active,
.ql-toolbar.ql-snow .ql-picker-label.ql-active { color: var(--accent); }
.ql-toolbar.ql-snow button.ql-active .ql-stroke,
.ql-toolbar.ql-snow .ql-picker-label.ql-active .ql-stroke { stroke: var(--accent); }
.ql-toolbar.ql-snow button.ql-active .ql-fill,
.ql-toolbar.ql-snow .ql-picker-label.ql-active .ql-fill { fill: var(--accent); }
.ql-toolbar.ql-snow .ql-picker-options {
    background: var(--bg2);
    border-color: var(--border);
    border-radius: var(--radius-sm);
    padding: 4px 0;
}
.ql-toolbar.ql-snow .ql-picker-item { color: var(--text-dim); }
.ql-toolbar.ql-snow .ql-picker-item:hover { color: var(--text); }
.ql-toolbar.ql-snow .ql-picker-item.ql-selected { color: var(--accent); }

.ql-container.ql-snow {
    border: none;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
}
.ql-editor {
    flex: 1;
    background: var(--bg0);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans', Helvetica, Arial, sans-serif;
    font-size: 14px;
    line-height: 1.65;
    padding: 12px 16px 20px;
    overflow-y: auto;
}
.ql-editor::-webkit-scrollbar { width: 6px; }
.ql-editor::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

.ql-editor.ql-blank::before {
    color: var(--text-muted);
    font-style: italic;
}
.ql-editor h1 { font-size: 1.7em; font-weight: 700; margin: 0.5em 0 0.3em; color: var(--text); }
.ql-editor h2 { font-size: 1.4em; font-weight: 600; margin: 0.4em 0 0.25em; color: var(--text); }
.ql-editor h3 { font-size: 1.15em; font-weight: 600; margin: 0.3em 0 0.2em; color: var(--text); }
.ql-editor p { margin: 0 0 0.5em; }
.ql-editor a { color: var(--accent); text-decoration: underline; }
.ql-editor blockquote {
    border-left: 3px solid var(--border-light);
    padding-left: 12px;
    color: var(--text-dim);
    margin: 0.4em 0;
}
.ql-editor pre.ql-syntax {
    background: var(--bg1);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 12px;
    line-height: 1.5;
    color: var(--text);
    overflow-x: auto;
}
.ql-editor code {
    background: var(--bg3);
    border-radius: 3px;
    padding: 2px 5px;
    font-family: ui-monospace, 'SF Mono', Menlo, Consolas, monospace;
    font-size: 0.88em;
    color: #f0883e;
}
.ql-editor ul, .ql-editor ol { padding-left: 1.5em; margin: 0.3em 0; }
.ql-editor li { margin: 0.15em 0; }
.ql-editor hr { border: none; border-top: 1px solid var(--border); margin: 1em 0; }
.ql-editor img { max-width: 100%; border-radius: var(--radius-sm); }
.ql-editor ::selection { background: rgba(88,166,255,0.25); }

.ql-snow .ql-tooltip {
    background: var(--bg2);
    border-color: var(--border);
    color: var(--text);
    border-radius: var(--radius-sm);
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.ql-snow .ql-tooltip input[type="text"] {
    background: var(--bg0);
    border-color: var(--border);
    color: var(--text);
    border-radius: 4px;
}
.ql-snow .ql-tooltip a { color: var(--accent); }

/* Meta footer */
#notes-meta-footer {
    flex-shrink: 0;
    padding: 8px 16px 12px;
}
.meta-toggle {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    padding: 6px 0;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-size: 11px;
    font-family: inherit;
    cursor: pointer;
    text-align: left;
    transition: color var(--transition);
}
.meta-toggle:hover { color: var(--text-dim); }
.meta-toggle .chevron {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    transition: transform var(--transition);
}
.meta-toggle[aria-expanded="true"] .chevron { transform: rotate(180deg); }
#notes-meta-summary { flex: 1; min-width: 0; word-break: break-word; }
#notes-meta-details {
    display: none;
    margin-top: 6px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    background: var(--bg1);
    border: 1px solid var(--border);
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.55;
    white-space: pre-line;
    word-break: break-all;
}
#notes-meta-details.visible { display: block; }

#notes-err {
    color: var(--danger);
    font-size: 12px;
    min-height: 1.2em;
    padding: 0 16px 8px;
}

input[type="checkbox"]#chk-encrypt { position: absolute; width: 0; height: 0; opacity: 0; pointer-events: none; }
    </style>
</head>
<body>
    <div id="notes-main">
        <aside id="notes-sidebar">
            <div id="sidebar-header">
                <div class="search-wrap">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><circle cx="7" cy="7" r="4"/><path d="M10.2 10.2L14 14"/></svg>
                    <input type="search" id="notes-search-input" placeholder="Search notes..." autocomplete="off">
                </div>
                <div class="filter-seg" role="group" aria-label="List filter">
                    <button type="button" id="filter-current" class="active" data-value="current">This site</button>
                    <button type="button" id="filter-all" data-value="all">All</button>
                </div>
            </div>
            <div id="notes-list-title">Notes</div>
            <div id="notes-list"></div>
        </aside>

        <div id="notes-editor-wrap">
            <input type="checkbox" id="chk-encrypt" tabindex="-1" aria-hidden="true">

            <div id="title-row">
                <button type="button" id="btn-new" class="icon-btn primary" title="New note" aria-label="New note">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M8 3v10M3 8h10"/></svg>
                </button>
                <input type="text" id="notes-title-input" placeholder="Untitled" autocomplete="off" maxlength="500">
                <span id="save-status" aria-live="polite"></span>
                <button type="button" id="btn-save" class="icon-btn" title="Save" aria-label="Save">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 14h10V5.2L10.8 2H3v12z"/><path d="M10 2v4h3"/><rect x="5" y="7" width="4" height="5" rx="0.5"/></svg>
                </button>
                <button type="button" id="btn-del" class="icon-btn danger" title="Delete note" aria-label="Delete note" disabled>
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4.5h10M6 4.5V3a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1v1.5M5 4.5l.5 8.5h5l.5-8.5"/></svg>
                </button>
            </div>

            <div id="encrypt-row">
                <span style="font-size:11px;color:var(--text-dim);flex-shrink:0">Encryption password</span>
                <div class="pw-inline-wrap">
                    <input type="password" id="pw1" class="pw-field" placeholder="Enter password once" autocomplete="off">
                    <button type="button" id="btn-pw-toggle" class="btn-pw-toggle" title="Show password" aria-label="Show password">
                        <svg class="eye-open" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1.5 8s2.5-4 6.5-4 6.5 4 6.5 4-2.5 4-6.5 4S1.5 8 1.5 8z"/><circle cx="8" cy="8" r="2"/></svg>
                        <svg class="eye-off" style="display:none" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2l12 12M6.5 6.5A2 2 0 0 0 8 11c.5 0 1-.1 1.5-.3M4 4.5C2.8 5.4 2 6.6 1.5 8c1.2 2.8 4 4.5 6.5 4.5 1.2 0 2.3-.3 3.3-.8"/><path d="M10.6 10.6c-.8.5-1.7.8-2.6.9-3.5.3-6.2-2.2-7-4.5.3-.8.8-1.5 1.3-2.1"/></svg>
                    </button>
                </div>
                <button type="button" id="btn-set-password" class="tb-btn">Set password</button>
            </div>

            <div id="editor-header">
                <div class="site-chip-wrap">
                    <input type="text" id="notes-match-input" spellcheck="false" autocomplete="off"
                           placeholder="Site or URL pattern" title="Site / URL pattern">
                </div>
                <button type="button" id="btn-lock-toggle" class="icon-btn" title="Encrypt note" aria-label="Encrypt note" aria-pressed="false">
                    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="7" width="9" height="7.5" rx="1"/><path d="M5 7V5a3 3 0 0 1 6 0v2"/></svg>
                </button>
            </div>

            <div id="editor-stack">
                <div id="editor-lock-overlay" aria-hidden="true">
                    <div class="lock-overlay-icon" aria-hidden="true">
                        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><rect x="3.5" y="7" width="9" height="7.5" rx="1"/><path d="M5 7V5a3 3 0 0 1 6 0v2"/></svg>
                    </div>
                    <p class="lock-overlay-msg">This note is encrypted. Enter the password to unlock the editor.</p>
                    <div class="unlock-form">
                        <div class="pw-inline-wrap">
                            <input type="password" id="unlock-pw" class="pw-field" placeholder="Password" autocomplete="off">
                            <button type="button" id="btn-unlock-pw-toggle" class="btn-pw-toggle" title="Show password" aria-label="Show password">
                                <svg class="eye-open" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M1.5 8s2.5-4 6.5-4 6.5 4 6.5 4-2.5 4-6.5 4S1.5 8 1.5 8z"/><circle cx="8" cy="8" r="2"/></svg>
                                <svg class="eye-off" style="display:none" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2l12 12M6.5 6.5A2 2 0 0 0 8 11c.5 0 1-.1 1.5-.3M4 4.5C2.8 5.4 2 6.6 1.5 8c1.2 2.8 4 4.5 6.5 4.5 1.2 0 2.3-.3 3.3-.8"/><path d="M10.6 10.6c-.8.5-1.7.8-2.6.9-3.5.3-6.2-2.2-7-4.5.3-.8.8-1.5 1.3-2.1"/></svg>
                            </button>
                        </div>
                        <button type="button" id="btn-unlock" class="tb-btn">Unlock</button>
                    </div>
                </div>
                <div id="editor-empty-hint">Select a note from the list or create a new one.</div>
                <div id="editor-container">
                    <div id="notes-editor"></div>
                </div>
            </div>

            <div id="notes-meta-footer">
                <button type="button" id="btn-meta-toggle" class="meta-toggle" aria-expanded="false">
                    <span id="notes-meta-summary"></span>
                    <svg class="chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4 4 4-4"/></svg>
                </button>
                <div id="notes-meta-details" class="meta-details"></div>
            </div>

            <div id="notes-err"></div>
        </div>
    </div>

    <script src="./node_modules/quill/dist/quill.js"></script>
    <script src="notes-renderer.js"></script>
</body>
</html>
