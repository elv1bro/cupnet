name: Build (macOS/Windows/Linux)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

# См. https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Verify Node & NPM in PATH
        run: |
          node -v
          npm -v

      - name: Cache electron caches
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-electron-cache-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-electron-cache-

      # ---------- Install deps per OS ----------
      - name: Install deps (macOS/Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci --foreground-scripts
          else
            npm i --foreground-scripts
          fi

      - name: AzureTLS native rebuild + smoke (if azuretls installed)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -d azuretls/node_modules/@2060.io/ref-napi ]; then
            npm run check:native
          else
            echo 'skip check:native: no azuretls/node_modules/@2060.io/ref-napi (install azuretls deps locally or in a prior step)'
          fi

      - name: Install deps (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          if (Test-Path "package-lock.json") {
            npm ci --ignore-scripts
          } else {
            npm i --ignore-scripts
          }

      - name: Patch ffi-napi libffi.gyp for Windows (double-call MSBuild bug)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $gyp = "node_modules/@2060.io/ffi-napi/deps/libffi/libffi.gyp"
          if (Test-Path $gyp) {
            (Get-Content $gyp -Raw) -replace "'call',\s*\r?\n\s*'preprocess_asm\.cmd'", "'preprocess_asm.cmd'" |
              Set-Content $gyp -NoNewline
            Write-Host "Patched $gyp (removed redundant 'call' from preprocess_asm action)"
          } else {
            Write-Host "Skipping patch: $gyp not found (ffi-napi is optional)"
          }

      - name: Rebuild native modules (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: npm rebuild

      # ---------- Build per OS (--publish never: один draft-релиз собирает job release-draft) ----------
      - name: Build macOS
        if: runner.os == 'macOS'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:mac:local

      - name: Build Windows
        if: runner.os == 'Windows'
        shell: powershell
        run: npm run dist:win:local

      - name: Build Linux
        if: runner.os == 'Linux'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run dist:linux:local

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/**
          if-no-files-found: error
          retention-days: 14

  # Черновик GitHub Release с DMG / NSIS / AppImage (+ blockmap) — только при push тега v*
  release-draft:
    name: Draft GitHub Release
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          path: release-assets
          merge-multiple: true

      - name: Draft release (attach installers)
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          tag_name: ${{ github.ref_name }}
          name: CupNet ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.exe
            release-assets/**/*.AppImage
            release-assets/**/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
