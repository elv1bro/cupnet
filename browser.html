<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'">
    <title>[CupNet]</title>
    <link rel="stylesheet" href="styles.css">
    <script src="cookies-page-match.js"></script>
</head>
<body>

<!-- ── Tab bar ──────────────────────────────────────────────────────────────── -->
<div id="tab-bar">
    <div id="tab-list">
        <button id="new-tab-btn" title="New tab (Ctrl+T)">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                <path d="M7 2v10M2 7h10"/>
            </svg>
        </button>
    </div>
</div>

<!-- ── Navigation toolbar ───────────────────────────────────────────────────── -->
<div id="browser-toolbar">

    <!-- Nav buttons: icon only -->
    <button id="back-btn" class="nav-btn" title="Back (Alt+←)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 3L5 8l5 5"/>
        </svg>
    </button>
    <button id="forward-btn" class="nav-btn" title="Forward (Alt+→)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 3l5 5-5 5"/>
        </svg>
    </button>
    <button id="reload-btn" class="nav-btn" title="Reload (Ctrl+R)">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13.5 2.5v4h-4"/>
            <path d="M13.5 6.5A5.5 5.5 0 1 1 10 2.8"/>
        </svg>
    </button>
    <button id="home-btn" class="nav-btn" title="Home / Start Page">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1.5 7.5L8 2l6.5 5.5"/>
            <path d="M3.5 6.5V13h3.5V9.5h2V13H12.5V6.5"/>
        </svg>
    </button>

    <!-- Compact proxy status pill (opens Proxy Manager on click) -->
    <button id="pb-status-btn" class="proxy-pill-btn" title="Proxy status — click to open Proxy Manager">
        <span id="pb-dot" class="proxy-dot"></span>
        <span class="pb-text-col">
            <span id="pb-name">Direct</span>
            <span id="pb-detail" class="pb-detail"></span>
        </span>
        <span id="pb-mode-badge" class="pb-mode-badge" style="display:none"></span>
    </button>

    <!-- Address bar -->
    <div class="address-bar-container">
        <input type="text" id="url-input" placeholder="Search or enter address…" autocomplete="off" spellcheck="false">
        <div id="loading-indicator"></div>
    </div>

    <!-- ── Unified tool dock ── -->
    <div class="tool-dock">

        <!-- Log pill: [● toggle | Log #N  42] -->
        <div class="tool-log-pill" id="log-pill">
            <!-- Left: recording toggle -->
            <button id="log-toggle-btn" class="log-rec-toggle-area" title="Toggle recording (OFF)">
                <span class="rec-dot"></span>
                <span class="tool-label log-toggle-label">REC</span>
            </button>
            <!-- Right: open log viewer -->
            <button id="log-viewer-btn" class="log-open-area" title="Open Network Log viewer">
                <span class="log-pill-text">Log</span>
                <span id="log-session-num" class="log-pill-num">#—</span>
                <span id="log-entry-badge" class="log-badge" style="display:none">0</span>
            </button>
        </div>

        <span class="tool-sep"></span>

        <!-- DevTools -->
        <button id="devtools-btn" class="tool-btn" title="DevTools · F12">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M5.5 4.5L2 8l3.5 3.5"/>
                <path d="M10.5 4.5L14 8l-3.5 3.5"/>
                <path d="M9.5 2.5l-3 11"/>
            </svg>
            <span class="tool-label">DevTools</span>
        </button>

        <!-- Cookie Manager -->
        <button id="cookies-btn" class="tool-btn" title="Cookie Manager — badge: cookies for current page URL" style="position:relative">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="8" cy="8" r="5.5"/>
                <circle cx="6" cy="6.5" r="0.9" fill="currentColor" stroke="none"/>
                <circle cx="10" cy="7"   r="0.9" fill="currentColor" stroke="none"/>
                <circle cx="7" cy="10.5" r="0.9" fill="currentColor" stroke="none"/>
                <circle cx="10.5" cy="10.5" r="0.7" fill="currentColor" stroke="none"/>
            </svg>
            <span class="tool-label">Cookies</span>
            <span id="cookie-page-badge" class="rules-hit-badge rules-hit-badge--cookies" aria-hidden="true"></span>
        </button>

        <!-- DNS Manager -->
        <button id="dns-btn" class="tool-btn" title="DNS Overrides Manager" style="position:relative">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="8" cy="8" r="5.5"/>
                <path d="M2.5 8h11"/>
                <path d="M8 2.5a8.2 8.2 0 0 1 0 11"/>
                <path d="M8 2.5a8.2 8.2 0 0 0 0 11"/>
            </svg>
            <span class="tool-label">DNS</span>
            <span id="dns-hit-badge" class="rules-hit-badge" aria-hidden="true"></span>
        </button>

        <span class="tool-sep"></span>

        <!-- Request Editor -->
        <button id="req-editor-btn" class="tool-btn" title="Request Editor">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 4h12"/>
                <path d="M2 8h7"/>
                <path d="M2 12h5"/>
                <path d="M11 10l3 2-3 2"/>
            </svg>
            <span class="tool-label">Req Editor</span>
        </button>

        <!-- Rules & Intercept -->
        <button id="rules-btn" class="tool-btn" title="Rules &amp; Intercept" style="position:relative">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3.5h12l-4.5 5v4l-3-1.5V8.5L2 3.5z"/>
            </svg>
            <span class="tool-label">Rules</span>
            <span id="rules-hit-badge" class="rules-hit-badge" aria-hidden="true"></span>
        </button>

        <!-- Page Analyzer -->
        <button id="analyzer-btn" class="tool-btn" title="Page Analyzer · Ctrl+Shift+A">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="7" cy="7" r="5"/>
                <path d="M11 11l3 3"/>
                <path d="M5 7h4"/>
                <path d="M7 5v4"/>
            </svg>
            <span class="tool-label">Analyzer</span>
        </button>

        <!-- System Console -->
        <button id="console-btn" class="tool-btn" title="System Console · Ctrl+Shift+K">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
                <rect x="1.5" y="2.5" width="13" height="11" rx="1.5"/>
                <path d="M4.5 6l2.5 2-2.5 2"/>
                <path d="M8.5 10.5h3"/>
            </svg>
            <span class="tool-label">Console</span>
        </button>

        <span class="tool-sep"></span>

        <!-- Settings -->
        <button id="settings-toggle-btn" class="tool-btn settings-toggle" title="Settings">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="8" cy="8" r="2.2"/>
                <path d="M8 1.5v1M8 13.5v1M1.5 8h1M13.5 8h1M3.4 3.4l.7.7M11.9 11.9l.7.7M3.4 12.6l.7-.7M11.9 4.1l.7-.7"/>
            </svg>
            <span class="tool-label">Settings</span>
        </button>

    </div>
</div>

<!-- Rule notification toasts -->
<div id="rule-toast-container"></div>


<script src="browser-renderer.js"></script>
</body>
</html>
