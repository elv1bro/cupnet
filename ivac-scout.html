<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'">
    <title>API Scout</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0f1117;
            --bg2: #161920;
            --bg3: #1e2233;
            --border: #2d3142;
            --text: #e2e8f0;
            --muted: #64748b;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #22c55e;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 13px;
        }
        .topbar, .filterbar, .statusbar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .statusbar {
            border-top: 1px solid var(--border);
            border-bottom: none;
            height: 30px;
            padding-top: 0;
            padding-bottom: 0;
            font-size: 11px;
            color: var(--muted);
        }
        .title { font-weight: 600; font-size: 14px; margin-right: 4px; }
        .spacer { flex: 1; }
        .sep { width: 1px; height: 22px; background: var(--border); margin: 0 2px; }
        input[type="text"] {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 6px;
            padding: 6px 9px;
            font-size: 12px;
            outline: none;
            min-width: 300px;
        }
        input[type="text"]:focus { border-color: var(--accent); }
        .btn {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 11px; border-radius: 6px; border: none;
            font-size: 12px; font-weight: 500; cursor: pointer;
            transition: filter 0.12s, opacity 0.12s;
            white-space: nowrap;
        }
        .btn:hover { filter: brightness(1.15); }
        .btn:active { filter: brightness(0.9); }
        .btn:disabled { opacity: 0.55; cursor: default; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-danger  { background: var(--danger); color: #fff; }
        .btn-ghost   { background: var(--bg3); border: 1px solid var(--border); color: var(--text); }
        .btn-ok      { background: var(--success); color: #fff; }
        .badge {
            font-size: 11px;
            color: var(--text);
            background: var(--bg3);
            border: 1px solid var(--border);
            padding: 3px 8px;
            border-radius: 10px;
            white-space: nowrap;
        }
        .cards {
            display: grid;
            grid-template-columns: repeat(6, minmax(130px, 1fr));
            gap: 8px;
            padding: 8px 14px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px 10px;
        }
        .card .k { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .4px; }
        .card .v { margin-top: 4px; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card .v.warn { color: #fca5a5; }
        .main {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 8px;
            padding: 8px 14px;
        }
        .panel {
            border: 1px solid var(--border);
            background: var(--bg2);
            border-radius: 8px;
            min-height: 0;
            display: flex;
            flex-direction: column;
        }
        .panel-head {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .panel-title { font-weight: 600; font-size: 12px; }
        .panel-body { min-height: 0; flex: 1; overflow: auto; }
        #endpoints-search {
            min-width: 170px;
            max-width: 220px;
        }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        thead { position: sticky; top: 0; z-index: 2; }
        th {
            text-align: left;
            background: var(--bg2);
            color: var(--muted);
            font-size: 11px;
            padding: 7px 10px;
            border-bottom: 1px solid var(--border);
            text-transform: uppercase;
            letter-spacing: .4px;
        }
        td {
            padding: 6px 10px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 420px;
        }
        tr:hover td { background: rgba(255,255,255,0.03); }
        .endpoint-path { color: #93c5fd; font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; }
        .endpoint-cat {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            border: 1px solid var(--border);
            color: #cbd5e1;
            background: var(--bg3);
            text-transform: uppercase;
        }
        #log {
            padding: 10px;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 12px;
            line-height: 1.45;
        }
        .next-box {
            margin: 8px 14px 10px;
            border: 1px solid var(--border);
            background: var(--bg2);
            border-radius: 8px;
            padding: 10px;
            font-size: 12px;
            color: #cbd5e1;
            flex-shrink: 0;
        }
        .next-box .h { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
        .next-box ul { margin-left: 18px; display: grid; gap: 3px; }
    </style>
</head>
<body>
    <div class="topbar">
        <span class="title">Scout API Explorer</span>
        <label style="font-size:11px;color:var(--muted)">URL:</label>
        <input id="target-url" type="text" value="https://appointment.ivacbd.com/">
        <div class="sep"></div>
        <button id="start-btn" class="btn btn-primary">Start</button>
        <button id="stop-btn" class="btn btn-danger" disabled>Stop</button>
        <button id="open-dump-btn" class="btn btn-ghost">Open _debug</button>
    </div>

    <div class="filterbar">
        <span class="badge">Proxy: <b id="proxy-status">Direct</b></span>
        <span class="badge">TLS: <b id="tls-status">chrome</b></span>
        <span class="badge">State: <b id="state">idle</b></span>
        <div class="spacer"></div>
        <input id="endpoints-search" type="text" placeholder="filter endpoints...">
        <button id="copy-endpoints-btn" class="btn btn-ok">Copy endpoints</button>
    </div>

    <div class="cards">
        <div class="card"><div class="k">Homepage</div><div id="m-home-status" class="v">-</div></div>
        <div class="card"><div class="k">Body Size</div><div id="m-home-size" class="v">-</div></div>
        <div class="card"><div class="k">JS Bundles</div><div id="m-js-count" class="v">-</div></div>
        <div class="card"><div class="k">Endpoints</div><div id="m-endpoints-count" class="v">-</div></div>
        <div class="card"><div class="k">Cloudflare</div><div id="m-cf" class="v">-</div></div>
        <div class="card"><div class="k">Duration</div><div id="m-duration" class="v">-</div></div>
    </div>

    <div class="main">
        <div class="panel">
            <div class="panel-head">
                <span class="panel-title">Discovered Endpoints</span>
                <span id="ep-count" class="badge">0</span>
            </div>
            <div class="panel-body">
                <table>
                    <thead>
                        <tr><th>Endpoint</th><th>Category</th></tr>
                    </thead>
                    <tbody id="endpoints-tbody"></tbody>
                </table>
            </div>
        </div>
        <div class="panel">
            <div class="panel-head">
                <span class="panel-title">Live Log</span>
            </div>
            <div class="panel-body">
                <div id="log"></div>
            </div>
        </div>
    </div>

    <div class="next-box">
        <div class="h">Что делать дальше</div>
        <ul id="next-actions">
            <li>Запусти Scout и дождись summary.</li>
        </ul>
    </div>

    <div class="statusbar">
        <span id="status-msg">Ready</span>
    </div>
    <script src="ivac-scout-renderer.js"></script>
</body>
</html>
